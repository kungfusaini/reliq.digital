<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reliq - Timeless Digital Solutions</title>
    <meta name="description" content="Reliq is a digital agency group specializing in timeless web design, powerful SEO, robust software, and effective AI solutions.">
    <meta name="keywords" content="Reliq, Reliq Studios, Reliq Labs, web design, SEO, software development, AI, digital agency">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://reliq.digital">
    
    <!-- Open Graph / Social Sharing -->
    <meta property="og:title" content="Reliq - Timless Digital Solutions">
    <meta property="og:description" content="Reliq is a digital agency group specializing in timeless web design, powerful SEO, robust software, and effective AI solutions.">
    <meta property="og:image" content="https://reliq.digital/og-image.png">
    <meta property="og:url" content="https://reliq.digital">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Reliq">
    
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Reliq - Digital Excellence">
    <meta name="twitter:description" content="Reliq is a digital agency group specializing in timeless web design, powerful SEO, robust software, and effective AI solutions.">
    <meta name="twitter:image" content="https://reliq.digital/og-image.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/reliq_studios_icon_16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/reliq_studios_icon_32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/reliq_studios_icon_180.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Plausible Analytics -->
    <script>
        if (window.location.hostname !== 'localhost') {
            const script = document.createElement('script');
            script.defer = true;
            script.setAttribute('data-domain', 'reliq.digital');
            script.src = '/stats/js/script.outbound-links.pageview-props.tagged-events.js';
            document.head.appendChild(script);
        }
    </script>
    <script>window.plausible = window.plausible || function() { (window.plausible.q = window.plausible.q || []).push(arguments) }</script>
    
    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Reliq",
      "url": "https://reliq.digital",
      "logo": "https://reliq.digital/logo-studios.png",
      "description": "Reliq is a digital agency group specializing in timeless web design, powerful SEO, robust software, and effective AI solutions.",
      "sameAs": [
        "https://reliqstudios.com",
        "https://reliqlabs.com"
      ],
      "subsidiary": [
        {
          "@type": "Organization",
          "name": "Reliq Studios",
          "url": "https://reliqstudios.com",
          "description": "Handcrafted web design and SEO services"
        },
        {
          "@type": "Organization", 
          "name": "Reliq Labs",
          "url": "https://reliqlabs.com",
          "description": "Robust software and AI solutions"
        }
      ]
    }
    </script>
</head>
<body>
    <!-- Semantic Headings for SEO -->
    <h1 class="visually-hidden">Reliq - Digital Excellence</h1>
    <div class="split-container">
        <div class="split-panel reliqstudios">
            <h2 class="visually-hidden">Reliq Studios</h2>
            <div class="particle-image" id="particle-image" data-params-src="particle-params-reliqstudios.json"></div>
            <a href="https://reliqstudios.com" class="logo">
                <img src="logo-studios.png" alt="ReliqStudios">
                <span class="logo-tagline">Timeless Web Design & Powerful SEO</span>
            </a>
        </div>
        <div class="split-panel reliqlabs">
            <h2 class="visually-hidden">Reliq Labs</h2>
            <div class="particle-image" id="particle-image-2" data-params-src="particle-params-reliqlabs.json"></div>
            <a href="https://reliqlabs.com" class="logo">
                <img src="logo-labs.png" alt="Reliqlabs">
                <span class="logo-tagline">Robust Software & Effective AI</span>
            </a>
        </div>
    </div>
    
    <script src="particle-image-responsive.js"></script>
    <script>
        // Initialize both particle canvases
        window.particleImageDisplay("particle-image");
        
        // Need to allow multiple instances - remove the global check
        window.particleImageInitialized = false;
        window.particleImageDisplay("particle-image-2");
        
        // Fade-in animation handler
        const particleCanvas = document.getElementById('particle-image');
        if (particleCanvas) {
            const startParticleFadeIn = () => {
                particleCanvas.classList.add('fade-in');
                document.getElementById('particle-image-2').classList.add('fade-in');
                
                // Fade in logos
                document.querySelectorAll('.logo').forEach(logo => {
                    logo.classList.add('fade-in');
                });
            };

            if (window.particleImageDisplayerReady) {
                startParticleFadeIn();
            } else {
                document.addEventListener('particleImageReady', startParticleFadeIn);
                setTimeout(startParticleFadeIn, 2000);
            }
        }
    </script>
</body>
</html>
