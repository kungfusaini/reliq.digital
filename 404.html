<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Reliq</title>
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://reliq.digital/404">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Google Sans Code', monospace;
        }

        .split-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
        }

        .split-panel {
            width: 50vw;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .split-panel.reliqlabs {
            background-color: #282828;
        }

        .split-panel.reliqstudios {
            background-color: #fbf1c7;
        }

        .error-code {
            font-size: clamp(60px, 15vw, 150px);
            font-weight: 500;
            line-height: 1;
        }

        .error-message {
            font-size: clamp(16px, 3vw, 28px);
            font-weight: 400;
            text-align: center;
        }

        .split-panel.reliqlabs .error-code,
        .split-panel.reliqlabs .error-message {
            color: #ebdbb2;
        }

        .split-panel.reliqstudios .error-code,
        .split-panel.reliqstudios .error-message {
            color: #3c3836;
        }

        .home-link {
            font-size: clamp(14px, 2vw, 18px);
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            transition: transform 0.3s ease;
        }

        .split-panel.reliqlabs .home-link {
            color: #ebdbb2;
            border: 2px solid #ebdbb2;
        }

        .split-panel.reliqlabs .home-link:hover {
            background-color: #ebdbb2;
            color: #282828;
        }

        .split-panel.reliqstudios .home-link {
            color: #3c3836;
            border: 2px solid #3c3836;
        }

        .split-panel.reliqstudios .home-link:hover {
            background-color: #3c3836;
            color: #fbf1c7;
        }

        .home-link:hover {
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .split-container {
                flex-direction: column;
            }
            .split-panel {
                width: 100vw;
                height: 50vh;
                height: 50dvh;
            }
        }
    </style>
</head>
<body>
    <div class="split-container">
        <div class="split-panel reliqlabs">
            <span class="error-code">404</span>
            <span class="error-message">Page Not Found</span>
            <a href="https://reliqlabs.com" class="home-link">Go to Reliq Labs</a>
        </div>
        <div class="split-panel reliqstudios">
            <span class="error-code">404</span>
            <span class="error-message">Page Not Found</span>
            <a href="https://reliqstudios.com" class="home-link">Go to Reliq Studios</a>
        </div>
    </div>
</body>
</html>
